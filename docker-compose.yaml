services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MLflow ────────────────────────────────────────────────────────────────

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    command: sh -c "mlflow server --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB} --artifacts-destination /mlflow/artifacts --serve-artifacts --host 0.0.0.0 --port 5000 --allowed-hosts 'mlflow,mlflow:*,localhost,localhost:*,127.0.0.1,127.0.0.1:*'"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Application ───────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: myapp-api:latest
    container_name: fastapi
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    image: myapp-celery:latest
    container_name: celery_worker
    command: >
      sh -c "mkdir -p /tmp/prometheus_multiproc &&
      PROMETHEUS_MULTIPROC_DIR=/tmp/prometheus_multiproc celery -A api.celery_app.celery_app worker --loglevel=info -Q predictions --concurrency=4"
    expose:
      - "8001"
    depends_on:
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped

  flower:
    image: myapp-celery:latest
    container_name: flower
    command: celery -A api.celery_app.celery_app flower --port=5555
    expose:
      - "5555"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    image: myapp-streamlit:latest
    container_name: streamlit
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    expose:
      - "8501"
    depends_on:
      - api
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped

  # ── Observability ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
      - celery
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/ml_app.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Nginx ─────────────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - streamlit
      - flower
      - celery
    command: >
      sh -c "apk add --no-cache apache2-utils &&
      htpasswd -cb /etc/nginx/.htpasswd admin $${NGINX_AUTH_PASSWORD} &&
      nginx -g 'daemon off;'"
    env_file: .env
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
  mlflow_artifacts: