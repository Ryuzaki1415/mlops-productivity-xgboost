services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: myapp-api:latest
    container_name: fastapi
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped

  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    image: myapp-celery:latest
    container_name: celery_worker
    command: celery -A api.celery_app.celery_app worker --loglevel=info -Q predictions --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped

  flower:
    image: myapp-celery:latest
    container_name: flower
    command: celery -A api.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    image: myapp-streamlit:latest
    container_name: streamlit
    command: streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file: .env
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  redis_data: