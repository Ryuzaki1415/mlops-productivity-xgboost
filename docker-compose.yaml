services:

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes


  celery:
    build: .
    container_name: celery_worker
    command: celery -A api.celery_app.celery_app worker --loglevel=info -Q predictions --concurrency=4
    depends_on:
      - redis
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app


  flower:
    build: .
    container_name: flower
    command: celery -A api.celery_app.celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app


volumes:
  redis_data: