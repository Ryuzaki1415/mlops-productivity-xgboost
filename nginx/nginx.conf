events {
    worker_connections 1024;
}
http {
    upstream fastapi {
        server api:8000;
    }
    upstream streamlit {
        server streamlit:8501;
    }
    upstream flower {
        server flower:5555;
    }
    upstream celery_metrics {
        server celery:8001;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name ml-productivity.centralindia.cloudapp.azure.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name ml-productivity.centralindia.cloudapp.azure.com;

        ssl_certificate /etc/letsencrypt/live/ml-productivity.centralindia.cloudapp.azure.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ml-productivity.centralindia.cloudapp.azure.com/privkey.pem;

        location /api/ {
            proxy_pass http://fastapi/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /streamlit/ {
            proxy_pass http://streamlit/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        location /flower/ {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://flower/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /celery-metrics/ {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://celery_metrics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}